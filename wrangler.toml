name = "gaarijua"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# Static assets emitted by the OpenNext build.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Workers logs (tail-able runtime + per-invocation logs).
[observability.logs]
enabled = true
invocation_logs = true

# R2 bucket for listing images, accessed via binding (env.CAR_IMAGES) instead
# of the AWS S3 SDK — the SDK's Node fs/http deps don't run on Workers.
[[r2_buckets]]
binding = "CAR_IMAGES"
bucket_name = "car-images"

# Secrets/vars are NOT stored here. Set them with `wrangler secret put <NAME>`
# (or in the Cloudflare dashboard) for production:
#   DATABASE_URL, AUTH_SECRET, AUTH_URL, AUTH_RESEND_KEY, EMAIL_FROM,
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET, R2_PUBLIC_BASE_URL
